<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="hero-section">
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="/media/scene.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </header>
    <div id="nav-placeholder"></div>
    <main>
        <h1>Welcome to My Website</h1>
        <p>This is the home page. You can edit this file to add your own content, like text, images, or links.</p>
        <p>For example, add a link: <a href="https://github.com">Visit GitHub</a></p>
    </main>
    <script>
        // Load nav.html dynamically
        fetch('/nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                // Highlight active nav link
                const currentPage = window.location.pathname;
                const navLinks = document.querySelectorAll('nav a');
                navLinks.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            });
    </script>
</body>
</html>
